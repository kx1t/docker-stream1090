name: Rebuild on Upstream Stream1090 Changes

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check-upstream:
    runs-on: ubuntu-24.04
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      should_build: ${{ steps.cache-upstream.outputs.cache-hit != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest upstream commit
        id: upstream
        run: |
          set -euo pipefail
          sha="$(curl -fsSL https://api.github.com/repos/mgrone/stream1090/commits/main | jq -r '.sha')"
          if [[ -z "$sha" || "$sha" == "null" ]]; then
            echo "Failed to fetch upstream SHA" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check if this upstream SHA was already built
        id: cache-upstream
        uses: actions/cache@v4
        with:
          path: .upstream-marker
          key: upstream-stream1090-${{ steps.upstream.outputs.sha }}

      - name: Mark upstream SHA as built candidate
        if: steps.cache-upstream.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .upstream-marker
          echo "${{ steps.upstream.outputs.sha }}" > .upstream-marker/sha

  build-amd64:
    runs-on: ubuntu-24.04
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        run: |
          set -euo pipefail
          repo_lower="${GITHUB_REPOSITORY,,}"
          upstream_sha="${{ needs.check-upstream.outputs.upstream_sha }}"
          short_upstream="${upstream_sha::7}"
          {
            echo "image=ghcr.io/${repo_lower}"
            echo "short_upstream=${short_upstream}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            STREAM1090_REF=${{ needs.check-upstream.outputs.upstream_sha }}
          tags: |
            ${{ steps.prep.outputs.image }}:upstream-build-amd64-${{ steps.prep.outputs.short_upstream }}
          cache-from: |
            type=registry,ref=${{ steps.prep.outputs.image }}:buildcache-amd64
          cache-to: |
            type=registry,ref=${{ steps.prep.outputs.image }}:buildcache-amd64,mode=max

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        run: |
          set -euo pipefail
          repo_lower="${GITHUB_REPOSITORY,,}"
          upstream_sha="${{ needs.check-upstream.outputs.upstream_sha }}"
          short_upstream="${upstream_sha::7}"
          {
            echo "image=ghcr.io/${repo_lower}"
            echo "short_upstream=${short_upstream}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            STREAM1090_REF=${{ needs.check-upstream.outputs.upstream_sha }}
          tags: |
            ${{ steps.prep.outputs.image }}:upstream-build-arm64-${{ steps.prep.outputs.short_upstream }}
          cache-from: |
            type=registry,ref=${{ steps.prep.outputs.image }}:buildcache-arm64
          cache-to: |
            type=registry,ref=${{ steps.prep.outputs.image }}:buildcache-arm64,mode=max

  build-armhf:
    # Requires a native ARMv7 self-hosted runner labelled: self-hosted, linux, armhf
    runs-on: [self-hosted, linux, armhf]
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        run: |
          set -euo pipefail
          repo_lower="${GITHUB_REPOSITORY,,}"
          upstream_sha="${{ needs.check-upstream.outputs.upstream_sha }}"
          short_upstream="${upstream_sha::7}"
          {
            echo "image=ghcr.io/${repo_lower}"
            echo "short_upstream=${short_upstream}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push armhf
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm/v7
          push: true
          build-args: |
            STREAM1090_REF=${{ needs.check-upstream.outputs.upstream_sha }}
          tags: |
            ${{ steps.prep.outputs.image }}:upstream-build-armhf-${{ steps.prep.outputs.short_upstream }}
          cache-from: |
            type=registry,ref=${{ steps.prep.outputs.image }}:buildcache-armhf
          cache-to: |
            type=registry,ref=${{ steps.prep.outputs.image }}:buildcache-armhf,mode=max

  publish-manifest:
    runs-on: ubuntu-24.04
    needs:
      - check-upstream
      - build-amd64
      - build-arm64
      - build-armhf
    if: needs.check-upstream.outputs.should_build == 'true'

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          upstream_sha="${{ needs.check-upstream.outputs.upstream_sha }}"
          short_upstream="${upstream_sha::7}"

          docker buildx imagetools create \
            -t "${image}:latest" \
            -t "${image}:upstream-${short_upstream}" \
            "${image}:upstream-build-amd64-${short_upstream}" \
            "${image}:upstream-build-arm64-${short_upstream}" \
            "${image}:upstream-build-armhf-${short_upstream}"

          docker buildx imagetools inspect "${image}:upstream-${short_upstream}"

  upstream-unchanged:
    runs-on: ubuntu-24.04
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build != 'true'

    steps:
      - name: Upstream unchanged
        run: echo "Upstream main SHA unchanged; skipping rebuild"
